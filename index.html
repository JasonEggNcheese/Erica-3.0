<style>
  /* Custom animations for the avatar */
  @keyframes subtle-breathing {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .animate-subtle-breathing {
    animation: subtle-breathing 4s ease-in-out infinite;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
  }
  .animate-shake {
    animation: shake 0.5s ease-in-out;
  }

  /* Animation for Agentic Vision CLICK action */
  @keyframes pulse-ring {
    0% {
      transform: scale(0.33);
      opacity: 1;
    }
    80%, 100% {
      transform: scale(1.5);
      opacity: 0;
    }
  }
  .animate-pulse-ring {
    animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    transform-origin: 50% 50%;
  }

  /* Custom scrollbar for transcript */
  .scrollbar-thin {
    scrollbar-width: thin;
    scrollbar-color: #a855f7BF transparent; /* thumb color track color */
  }
  .scrollbar-thin::-webkit-scrollbar {
    width: 8px;
  }
  .scrollbar-thin::-webkit-scrollbar-track {
    background: transparent;
  }
  .scrollbar-thin::-webkit-scrollbar-thumb {
    background-color: #a855f7BF;
    border-radius: 20px;
    border: 3px solid transparent;
    background-clip: content-box;
  }

  /* Utility for screen-reader only text */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
</style>
